name: Deploy to Cloudflare Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
concurrency:
  group: "cf-pages-manext"
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historial completo: el sitemap usa git log para lastmod real
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npx astro check
      - run: npm run build
      # Huella del commit DENTRO del artefacto publicado. El gate final se la
      # pide al dominio: si no la devuelve, el deploy no llego a produccion.
      - name: Sellar build-id
        run: echo "${{ github.sha }}" > dist/build-id.txt
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@3 pages project create manext --production-branch=main 2>/dev/null || true
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=manext --branch=main --commit-dirty=true

      # ─── GATE REAL: verifica el DOMINIO, no el build ───
      - name: Verificar que el dominio sirve este commit
        run: |
          DOMINIO="mantenimientodeextintores.mx"
          for i in $(seq 1 12); do
            sleep 10
            LIVE=$(curl -fsSL --max-time 15 "https://$DOMINIO/build-id.txt?cb=${RANDOM}${i}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              echo "OK — $DOMINIO sirve ${GITHUB_SHA:0:12}"; exit 0
            fi
            echo "intento $i/12 — el dominio devuelve '${LIVE:0:12}', esperado '${GITHUB_SHA:0:12}'"
          done
          echo "::error::$DOMINIO NO sirve este build tras 2 min. Deploy verde pero el dominio apunta a otro origen."
          exit 1
